# Human Detection Model Configuration
# This file contains all hyperparameters for training and inference

model:
  input_size: [300, 300]
  num_classes: 2  # Background + Person
  backbone: mobilenet_v2  # Options: mobilenet_v2, resnet50

training:
  batch_size: 16
  num_epochs: 120
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  lr_decay_steps: [80, 100]
  lr_decay_gamma: 0.1
  warmup_epochs: 5

data:
  train_data_path: datasets/raw/images/train
  val_data_path: datasets/raw/images/val
  test_data_path: datasets/raw/images/test
  train_annotation_path: datasets/raw/annotations/train.json
  val_annotation_path: datasets/raw/annotations/val.json
  test_annotation_path: datasets/raw/annotations/test.json
  annotation_format: coco  # Options: coco, voc, yolo
  num_workers: 4

augmentation:
  train_transforms: true
  horizontal_flip_prob: 0.5
  color_jitter: [0.2, 0.2, 0.2, 0.1]  # [brightness, contrast, saturation, hue]

inference:
  conf_threshold: 0.5
  nms_threshold: 0.45
  top_k: 200
